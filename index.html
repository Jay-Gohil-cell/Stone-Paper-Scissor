<!DOCTYPE html>
<hmtl>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Stone Paper Scissor - Game</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <h1 class="heading">Stone Paper Scissor - Game</h1>

            <div class="themes">
                <div class="style-1 style" id="stone"></div>
                <div class="style-2 style" id="paper"></div>
                <div class="style-3 style" id="scissor"></div>
            </div>

            <div class="result">
                <div class="myresult sub-rel">
                    <h1 class="count-1">00</h1>
                    <h2>Your Score</h2>
                </div>
                <div class="compresult sub-rel">
                    <h1 class="count-2">00</h1>
                    <h2>Computer Score</h2>
                </div>
            </div>

            <div class="bothChoise">
                <h3 class="usr-cho">User Choice</h3>
                <h3 class="comp-cho">Computer Choice</h3>
            </div>

            <div class="last">
                <h1 class="current">Best of Luck</h1>
            </div>

        </div>

    <script src="script.js"></script>
    </body>
</hmtl>
